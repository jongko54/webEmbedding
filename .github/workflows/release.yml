name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build release assets
        run: python3 scripts/release_bundle.py

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/source-first-clone-bundle.tar.gz
            dist/install.py
            dist/install.sh
            dist/SHA256SUMS
